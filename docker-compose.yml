# ─────────────────────────────────────────────────────────────────────────────
# 智造管家（SmartFactory Agent）Docker Compose 编排
#
# 使用方式：
#   cp .env.example .env        # 第一次使用时复制并修改环境变量
#   docker compose up -d        # 一键启动所有服务
#   docker compose logs -f      # 查看日志
#   docker compose down         # 停止服务（数据不丢失）
#
# 服务端口映射：
#   Web 界面：http://localhost:80
#   API 服务：http://localhost:3000（仅容器网络内，或调试时映射）
#   MySQL：  localhost:3306（仅调试时启用）
#   Redis：  localhost:6379（仅调试时启用）
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── MySQL 8.0 ──────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: sf_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${DB_NAME}
      MYSQL_USER:          ${DB_USER}
      MYSQL_PASSWORD:      ${DB_PASS}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
      - --max-connections=200
      - --innodb-buffer-pool-size=256M
      - --slow-query-log=ON
      - --long-query-time=2
      - --slow-query-log-file=/var/log/mysql/slow.log
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - mysql_logs:/var/log/mysql
    ports:
      # 生产环境建议注释掉此行，避免数据库端口暴露到宿主机
      - "127.0.0.1:3307:3306"
    networks:
      - sf_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ── Redis 7 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sf_redis
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - 128mb
      - --maxmemory-policy
      - allkeys-lru
      - --loglevel
      - notice
    volumes:
      - redis_data:/data
    ports:
      # 生产环境建议注释掉此行
      - "127.0.0.1:6379:6379"
    networks:
      - sf_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: "0.5"

  # ── API 服务（Node.js 18）──────────────────────────────────────────────────
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    image: smart-factory-api:latest
    container_name: sf_api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV:       development
      PORT:           3000
      # 数据库
      DB_HOST:        mysql
      DB_PORT:        3306
      DB_NAME:        ${DB_NAME}
      DB_USER:        ${DB_USER}
      DB_PASS:        ${DB_PASS}
      DB_POOL_SIZE:   ${DB_POOL_SIZE:-10}
      # Redis
      REDIS_HOST:     redis
      REDIS_PORT:     6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # 认证
      JWT_SECRET:         ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-}
      JWT_EXPIRES_IN:     ${JWT_EXPIRES_IN:-7d}
      # 应用
      APP_NAME:       ${APP_NAME:-智造管家}
      LOG_LEVEL:      ${LOG_LEVEL:-info}
      # CORS
      CORS_ORIGINS:   ${CORS_ORIGINS:-http://localhost}
      # AI（Phase 2，暂时留空）
      AI_ENGINE_URL:  ${AI_ENGINE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - api_logs:/app/logs
    # API 端口仅绑定到容器网络，由 Nginx 统一对外暴露
    expose:
      - "3000"
    networks:
      - sf_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ── Web 前端（React + Nginx）──────────────────────────────────────────────
  web:
    build:
      context: ./services/web
      dockerfile: Dockerfile
    image: smart-factory-web:latest
    container_name: sf_web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-80}:80"
    networks:
      - sf_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"

# ── 持久化卷 ──────────────────────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local
  mysql_logs:
    driver: local
  redis_data:
    driver: local
  api_logs:
    driver: local

# ── 专用网络（容器间隔离通信）────────────────────────────────────────────────
networks:
  sf_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

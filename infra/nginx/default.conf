# =============================================================================
# 智造管家 Nginx 生产配置
# 职责: 静态文件服务 + SPA fallback + /api 反向代理 + SSE 支持
# =============================================================================

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    # 上传文件大小限制（对应后端 multer 12 MB 限制）
    client_max_body_size 12m;

    # ── Gzip 压缩 ─────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_comp_level   5;
    gzip_proxied      any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── 安全响应头（server 级兜底，location 级会覆盖，需在 location 重复声明）──
    add_header X-Frame-Options         "SAMEORIGIN"                        always;
    add_header X-Content-Type-Options  "nosniff"                           always;
    add_header X-XSS-Protection        "1; mode=block"                     always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'self';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 隐藏 nginx 版本
    server_tokens off;

    # ── 上传文件代理（优先匹配，避免被静态规则拦截）────────────────────────────
    location ^~ /uploads/ {
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── 静态资源长期缓存（Vite 构建产物带 hash 指纹）──────────────────────────
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control        "public, immutable";
        add_header X-Frame-Options      "SAMEORIGIN"   always;
        add_header X-Content-Type-Options "nosniff"    always;
        access_log off;
    }

    # ── API 反向代理 ──────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;

        # SSE / WebSocket 支持
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # AI 流式输出可能较慢，放宽超时
        proxy_connect_timeout  10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # 关闭缓冲，保证 SSE 逐 chunk 推送到客户端
        proxy_buffering off;
        proxy_cache     off;

        # CORS 由后端 Express 统一处理，Nginx 不干预
    }

    # ── 健康检查端点（供 Docker / LB 探活）────────────────────────────────────
    location /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # ── SPA History Fallback ──────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # index.html 禁止缓存，确保部署后立即生效
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";

        # 安全响应头（location 级 add_header 会覆盖 server 级，必须重复声明）
        add_header X-Frame-Options         "SAMEORIGIN"                        always;
        add_header X-Content-Type-Options  "nosniff"                           always;
        add_header X-XSS-Protection        "1; mode=block"                     always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin"   always;
        add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'self';" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    # ── 日志 ─────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
}

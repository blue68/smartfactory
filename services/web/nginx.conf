# ─────────────────────────────────────────────────────────────────────────────
# 智造管家 Nginx 配置
# 职责：静态文件服务 + API 反向代理 + SPA fallback
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── 字符集 ────────────────────────────────────────────────────────────────
    charset utf-8;

    # ── 上传文件大小限制 ─────────────────────────────────────────────────────
    client_max_body_size 12m;

    # ── Gzip 压缩 ─────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── 安全响应头 ────────────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"            always;
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-XSS-Protection         "1; mode=block"         always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'self';" always;
    # HSTS 仅在 HTTPS 终止层启用，当前 HTTP 模式下注释
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── 上传文件反向代理（必须在静态资源规则之前，使用 ^~ 优先匹配）────────────
    location ^~ /uploads/ {
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── 静态资源缓存策略 ──────────────────────────────────────────────────────
    # Vite 构建产物带 hash 指纹，可以长期缓存
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options           "SAMEORIGIN"            always;
        add_header X-Content-Type-Options    "nosniff"               always;
        add_header X-XSS-Protection         "1; mode=block"         always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        access_log off;
    }

    # ── API 反向代理 ──────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;

        # WebSocket 支持（AI 流式输出）
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时配置：AI 流式响应可能耗时较长
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # 关闭缓冲，支持流式输出
        proxy_buffering       off;
        proxy_cache           off;

        # CORS 由后端 Express 统一控制（SEC-012），Nginx 不干预。
    }

    # ── 健康检查端点（供 Docker 健康检查使用）─────────────────────────────────
    location /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # ── SPA History Fallback ──────────────────────────────────────────────────
    # 所有非文件请求均返回 index.html，由 React Router 处理路由
    location / {
        try_files $uri $uri/ /index.html;

        # index.html 禁止缓存，确保部署后立即生效
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";

        # 安全响应头（location 中 add_header 会覆盖 server 级别，需重复声明）
        add_header X-Frame-Options           "SAMEORIGIN"            always;
        add_header X-Content-Type-Options    "nosniff"               always;
        add_header X-XSS-Protection         "1; mode=block"         always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy  "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'self';" always;
        # HSTS 仅在 HTTPS 终止层启用，当前 HTTP 模式下注释
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    # ── 隐藏 Nginx 版本信息 ───────────────────────────────────────────────────
    server_tokens off;

    # ── 访问日志 ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
}

name: Bug report
description: 报告可复现的缺陷
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        提交前请确认该问题不是商业使用授权咨询。商业授权请通过 README 中的联系方式联系作者。
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 简要说明发生了什么，以及你期望的正确结果。
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 请提供稳定复现路径。
      placeholder: |
        1. 登录租户 FACTORY001
        2. 进入 ...
        3. 点击 ...
        4. 看到 ...
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 影响模块
      options:
        - Web 管理端
        - API 服务
        - 数据库/初始化脚本
        - 微信小程序
        - 部署/运维
        - 文档
        - 其他
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 请填写分支、提交号、浏览器、Node/MySQL/Redis/Docker 版本等。
      placeholder: |
        branch:
        commit:
        browser:
        node:
        mysql:
        redis:
        docker:
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: 日志或截图
      description: 可粘贴关键日志、错误堆栈或截图。请先移除密码、Token、手机号等敏感信息。
      render: shell
    validations:
      required: false


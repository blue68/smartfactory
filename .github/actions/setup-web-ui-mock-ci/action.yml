name: Setup Web UI Mock CI
description: Prepare dependencies and browser runtime for mock-browser Playwright jobs

runs:
  using: composite
  steps:
    - name: Install root dependencies
      shell: bash
      run: npm ci

    - name: Install web dependencies
      shell: bash
      run: npm ci
      working-directory: services/web

    - name: Install Playwright chromium
      shell: bash
      run: npx playwright install --with-deps chromium

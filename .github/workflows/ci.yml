# =============================================================================
# CI — Pull Request 检查
# 触发: PR 向 main / develop 提交或更新时
# 步骤: type-check → lint → unit-test (后端 + 前端并行)
#       → integration-test (后端，依赖 MySQL + Redis)
# =============================================================================

name: CI

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "services/**"
      - ".github/workflows/ci.yml"
  push:
    branches:
      - develop
    paths:
      - "services/**"

concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 后端: type-check + unit test
  # ---------------------------------------------------------------------------
  api-unit:
    name: "API — typecheck + unit test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api

    env:
      NODE_ENV: test
      JWT_SECRET: ci-test-secret-do-not-use-in-prod-32c
      JWT_REFRESH_SECRET: ci-test-refresh-secret-32chars

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit -- --ci --coverage --coverageDirectory=coverage/unit

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-unit-coverage
          path: services/api/coverage/unit/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 后端: integration test (依赖 MySQL 8.0 + Redis 7)
  # ---------------------------------------------------------------------------
  api-integration:
    name: "API — integration test"
    runs-on: ubuntu-latest
    needs: api-unit
    defaults:
      run:
        working-directory: services/api

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: smart_factory_test
          MYSQL_USER: sfuser
          MYSQL_PASSWORD: sfpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=30s

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    env:
      NODE_ENV: test
      PORT: 3000
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: smart_factory_test
      DB_USER: sfuser
      DB_PASS: sfpass
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      JWT_SECRET: ci-test-secret-do-not-use-in-prod-32c
      JWT_REFRESH_SECRET: ci-test-refresh-secret-32chars
      JWT_EXPIRES_IN: 1h
      CORS_ORIGINS: http://localhost

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply DB init schema
        run: |
          mysql -h 127.0.0.1 -P 3306 -u sfuser -psfpass smart_factory_test \
            < ../../infra/db/init.sql 2>/dev/null || \
          mysql -h 127.0.0.1 -P 3306 -u root -proot smart_factory_test \
            < ../../infra/db/init.sql || echo "init.sql skipped"

      - name: Run migrations
        run: |
          for f in $(ls src/migrations/*.sql 2>/dev/null | sort); do
            echo "Applying $f ..."
            mysql -h 127.0.0.1 -P 3306 -u sfuser -psfpass smart_factory_test < "$f"
          done

      - name: Build
        run: npm run build

      - name: Integration tests
        run: npm run test:integration -- --ci --forceExit --detectOpenHandles

  # ---------------------------------------------------------------------------
  # 前端: lint + type-check + unit test
  # ---------------------------------------------------------------------------
  web:
    name: "Web — lint / typecheck / test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

  # ---------------------------------------------------------------------------
  # 汇总门禁: 所有 job 通过才允许合并
  # ---------------------------------------------------------------------------
  ci-gate:
    name: CI Gate
    needs: [api-unit, api-integration, web]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          results=(
            "${{ needs.api-unit.result }}"
            "${{ needs.api-integration.result }}"
            "${{ needs.web.result }}"
          )
          failed=0
          for r in "${results[@]}"; do
            if [ "$r" != "success" ]; then
              echo "Job failed or skipped: $r"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "CI gate FAILED — merge blocked."
            exit 1
          fi
          echo "CI gate PASSED."

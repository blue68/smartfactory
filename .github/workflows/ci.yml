# =============================================================================
# CI — Pull Request 检查
# 触发: PR 向 main / develop 提交或更新时
# 步骤: type-check → lint → unit-test (后端 + 前端并行)
#       → integration-test / e2e-test (后端，依赖 MySQL + Redis)
# =============================================================================

name: CI

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "services/**"
      - "tests/**"
      - "scripts/**"
      - "infra/**"
      - "docker-compose.yml"
      - "package.json"
      - "package-lock.json"
      - "playwright.config.ts"
      - "playwright.global-setup.ts"
      - ".github/workflows/**"
      - ".github/actions/**"
  push:
    branches:
      - develop
    paths:
      - "services/**"
      - "tests/**"
      - "scripts/**"
      - "infra/**"
      - "docker-compose.yml"
      - "package.json"
      - "package-lock.json"
      - "playwright.config.ts"
      - "playwright.global-setup.ts"
      - ".github/workflows/**"
      - ".github/actions/**"

concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 后端: type-check + unit test
  # ---------------------------------------------------------------------------
  api-unit:
    name: "API — typecheck + unit test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api

    env:
      NODE_ENV: test
      JWT_SECRET: ci-test-secret-do-not-use-in-prod-32c
      JWT_REFRESH_SECRET: ci-test-refresh-secret-32chars

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit -- --ci --coverage --coverageDirectory=coverage/unit

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-unit-coverage
          path: services/api/coverage/unit/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 后端: integration test (依赖 MySQL 8.0 + Redis 7)
  # ---------------------------------------------------------------------------
  api-integration:
    needs: api-unit
    uses: ./.github/workflows/api-managed-test.yml
    with:
      job_name: "API — integration test"
      test_command: "npm run test:integration:managed"

  # ---------------------------------------------------------------------------
  # 后端: 外协链路关键单测（半成品外协采购联动）
  # ---------------------------------------------------------------------------
  api-outsource-flow-unit:
    name: "API — outsource flow unit test"
    needs: api-unit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api

    env:
      NODE_ENV: test
      JWT_SECRET: ci-test-secret-do-not-use-in-prod-32c
      JWT_REFRESH_SECRET: ci-test-refresh-secret-32chars

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Outsource flow unit tests
        run: npm run test:unit:outsource-flow -- --ci --coverage --coverageDirectory=coverage/outsource-flow --coverageReporters=text-summary --coverageReporters=json-summary --coverageReporters=lcov --coverageReporters=html --coverageReporters=clover

      - name: Print outsource-flow coverage summary
        run: |
          node -e "const fs=require('fs');const p='coverage/outsource-flow/coverage-summary.json';if(!fs.existsSync(p)){console.error('coverage summary not found:',p);process.exit(1);}const s=JSON.parse(fs.readFileSync(p,'utf8'));const keys=Object.keys(s);const bySuffix=(suffix)=>{const k=keys.find(x=>x.endsWith(suffix));return k?s[k]?.lines?.pct:'N/A';};console.log('Coverage (lines):');console.log('- all:',(s.total?.lines?.pct??'N/A')+'%');console.log('- production-phase1.service.ts:',bySuffix('/src/modules/production/production-phase1.service.ts')+'%');console.log('- scheduler.service.ts:',bySuffix('/src/modules/production/scheduler.service.ts')+'%');console.log('- incomingInspection.service.ts:',bySuffix('/src/modules/incoming-inspection/incomingInspection.service.ts')+'%');console.log('- purchase-suggestion.service.ts:',bySuffix('/src/modules/purchase/purchase-suggestion.service.ts')+'%');console.log('- purchase.service.ts:',bySuffix('/src/modules/purchase/purchase.service.ts')+'%');"

      - name: Upload outsource-flow coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-outsource-flow-coverage
          path: services/api/coverage/outsource-flow/
          retention-days: 7

  api-access-control-unit:
    name: "API — access control unit test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api

    env:
      NODE_ENV: test
      JWT_SECRET: ci-test-secret-do-not-use-in-prod-32c
      JWT_REFRESH_SECRET: ci-test-refresh-secret-32chars

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Access control unit tests
        run: npm run test:unit:access-control -- --ci

  api-access-control-integration:
    needs:
      - api-unit
      - api-access-control-unit
    uses: ./.github/workflows/api-managed-test.yml
    with:
      job_name: "API — access control integration test"
      test_command: "npm run test:integration:access-control:managed"

  # ---------------------------------------------------------------------------
  # 后端: e2e test (依赖 MySQL 8.0 + Redis 7)
  # ---------------------------------------------------------------------------
  api-e2e:
    needs: api-integration
    uses: ./.github/workflows/api-managed-test.yml
    with:
      job_name: "API — e2e test"
      test_command: "npm run test:e2e:managed"

  # ---------------------------------------------------------------------------
  # 前端: lint + type-check + unit test
  # ---------------------------------------------------------------------------
  web:
    name: "Web — lint / typecheck / test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

  # ---------------------------------------------------------------------------
  # 前端: Playwright mock browser regression
  # ---------------------------------------------------------------------------
  web-ui-mock:
    name: "Web UI — Playwright mock browser (${{ matrix.label }})"
    runs-on: ubuntu-latest
    needs: web
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: settlement
            command: npm run test:web:ui:settlement
            artifact: web-ui-mock-settlement
          - label: sales-order
            command: npm run test:web:ui:sales-order
            artifact: web-ui-mock-sales-order
          - label: purchase-delivery
            command: npm run test:web:ui:purchase-delivery
            artifact: web-ui-mock-purchase-delivery
          - label: process-config
            command: npm run test:web:ui:process-config
            artifact: web-ui-mock-process-config

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            services/web/package-lock.json

      - uses: ./.github/actions/setup-web-ui-mock-ci

      - name: Playwright mock browser regression
        run: ${{ matrix.command }}

      - name: Upload Playwright artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.artifact }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 采购前端真实交互: 本地容器 + Playwright smoke
  # ---------------------------------------------------------------------------
  purchase-ui-smoke:
    uses: ./.github/workflows/real-browser-ui-playwright.yml
    with:
      job_name: "Purchase UI — Playwright smoke"
      test_command: "npm run test:purchase:ui:smoke"
      artifact_name: "purchase-ui-smoke-playwright"

  # ---------------------------------------------------------------------------
  # 来料质检前端真实交互: 本地容器 + Playwright smoke
  # ---------------------------------------------------------------------------
  incoming-inspection-ui-smoke:
    uses: ./.github/workflows/real-browser-ui-playwright.yml
    with:
      job_name: "Incoming Inspection UI — Playwright smoke"
      test_command: "npm run test:incoming-inspection:ui:smoke"
      artifact_name: "incoming-inspection-ui-smoke-playwright"

  # ---------------------------------------------------------------------------
  # 采购建议管理前端真实交互: 本地容器 + Playwright smoke
  # ---------------------------------------------------------------------------
  purchase-suggestion-ui-smoke:
    uses: ./.github/workflows/real-browser-ui-playwright.yml
    with:
      job_name: "Purchase Suggestion UI — Playwright smoke"
      test_command: "npm run test:purchase-suggestion:ui:smoke"
      artifact_name: "purchase-suggestion-ui-smoke-playwright"

  # ---------------------------------------------------------------------------
  # 权限中心前端真实交互: 本地容器 + Playwright smoke
  # ---------------------------------------------------------------------------
  permission-control-ui-smoke:
    uses: ./.github/workflows/real-browser-ui-playwright.yml
    with:
      job_name: "Permission Control UI — Playwright smoke"
      pre_test_command: "npm run test:permission-control:bootstrap"
      test_command: "npm run test:permission-control:ui:smoke"
      artifact_name: "permission-control-ui-smoke-playwright"

  # ---------------------------------------------------------------------------
  # 权限中心前端真实交互: 本地容器 + Playwright regression
  # ---------------------------------------------------------------------------
  permission-control-ui-regression:
    if: github.event_name == 'push' && github.ref_name == 'develop'
    uses: ./.github/workflows/real-browser-ui-playwright.yml
    with:
      job_name: "Permission Control UI — Playwright regression"
      pre_test_command: "npm run test:permission-control:bootstrap"
      test_command: "npm run test:permission-control:ui:regression"
      artifact_name: "permission-control-ui-regression-playwright"

  # ---------------------------------------------------------------------------
  # 销售订单前端真实交互: 本地容器 + Playwright smoke
  # ---------------------------------------------------------------------------
  sales-order-ui-smoke:
    uses: ./.github/workflows/real-browser-ui-playwright.yml
    with:
      job_name: "Sales Order UI — Playwright smoke"
      test_command: "npm run test:sales-order:ui:smoke"
      artifact_name: "sales-order-ui-smoke-playwright"

  # ---------------------------------------------------------------------------
  # 工序配置前端真实交互: 本地容器 + Playwright smoke
  # ---------------------------------------------------------------------------
  process-config-ui-smoke:
    uses: ./.github/workflows/real-browser-ui-playwright.yml
    with:
      job_name: "Process Config UI — Playwright smoke"
      test_command: "npm run test:process-config:ui:smoke"
      artifact_name: "process-config-ui-smoke-playwright"

  # ---------------------------------------------------------------------------
  # 生产排产前端真实交互: 本地容器 + Playwright smoke

      artifact_name: "production-schedule-ui-smoke-playwright"

  # ---------------------------------------------------------------------------
  # 生产排产前端真实交互: 本地容器 + Playwright regression
  # ---------------------------------------------------------------------------
  production-schedule-ui-regression:
    if: github.event_name == 'push' && github.ref_name == 'develop'
    uses: ./.github/workflows/real-browser-ui-playwright.yml
    with:
      job_name: "Production Schedule UI — Playwright regression"
      test_command: "npm run test:production-schedule:ui:regression"
      artifact_name: "production-schedule-ui-regression-playwright"

  # ---------------------------------------------------------------------------
  # 生产工单前端真实交互: 本地容器 + Playwright smoke
  # ---------------------------------------------------------------------------
  production-order-ui-smoke:
    uses: ./.github/workflows/real-browser-ui-playwright.yml
    with:
      job_name: "Production Order UI — Playwright smoke"
      test_command: "npm run test:production-order:ui:smoke"
      artifact_name: "production-order-ui-smoke-playwright"

  # ---------------------------------------------------------------------------
  # 生产工单前端真实交互: 本地容器 + Playwright regression
  # ---------------------------------------------------------------------------
  production-order-ui-regression:
    if: github.event_name == 'push' && github.ref_name == 'develop'
    uses: ./.github/workflows/real-browser-ui-playwright.yml
    with:
      job_name: "Production Order UI — Playwright regression"
      test_command: "npm run test:production-order:ui:regression"
      artifact_name: "production-order-ui-regression-playwright"

  # ---------------------------------------------------------------------------
  # 生产任务前端真实交互: 本地容器 + Playwright smoke
  # ---------------------------------------------------------------------------
  production-task-ui-smoke:
    uses: ./.github/workflows/real-browser-ui-playwright.yml
    with:
      job_name: "Production Task UI — Playwright smoke"
      test_command: "npm run test:production-task:ui:smoke"
      artifact_name: "production-task-ui-smoke-playwright"

  # ---------------------------------------------------------------------------
  # 生产任务前端真实交互: 本地容器 + Playwright regression
  # ---------------------------------------------------------------------------
  production-task-ui-regression:
    if: github.event_name == 'push' && github.ref_name == 'develop'
    uses: ./.github/workflows/real-browser-ui-playwright.yml
    with:
      job_name: "Production Task UI — Playwright regression"
      test_command: "npm run test:production-task:ui:regression"
      artifact_name: "production-task-ui-regression-playwright"

  # ---------------------------------------------------------------------------
  # 生产缺料看板前端真实交互: 本地容器 + Playwright smoke
  # ---------------------------------------------------------------------------
  production-shortage-ui-smoke:
    uses: ./.github/workflows/real-browser-ui-playwright.yml
    with:
      job_name: "Production Shortage UI — Playwright smoke"
      test_command: "npm run test:production-shortage:ui:smoke"
      artifact_name: "production-shortage-ui-smoke-playwright"

  # ---------------------------------------------------------------------------
  # 生产缺料看板前端真实交互: 本地容器 + Playwright regression
  # ---------------------------------------------------------------------------
  production-shortage-ui-regression:
    if: github.event_name == 'push' && github.ref_name == 'develop'
    uses: ./.github/workflows/real-browser-ui-playwright.yml
    with:
      job_name: "Production Shortage UI — Playwright regression"
      test_command: "npm run test:production-shortage:ui:regression"
      artifact_name: "production-shortage-ui-regression-playwright"

  # ---------------------------------------------------------------------------
  # 工序配置前端真实交互: 本地容器 + Playwright regression
  # ---------------------------------------------------------------------------
  process-config-ui-regression:
    if: github.event_name == 'push' && github.ref_name == 'develop'
    uses: ./.github/workflows/real-browser-ui-playwright.yml
    with:
      job_name: "Process Config UI — Playwright regression"
      test_command: "npm run test:process-config:ui:regression"
      artifact_name: "process-config-ui-regression-playwright"

  # ---------------------------------------------------------------------------
  # 库存总览前端真实交互: 本地容器 + Playwright smoke
  # ---------------------------------------------------------------------------
  inventory-ui-smoke:
    uses: ./.github/workflows/real-browser-ui-playwright.yml
    with:
      job_name: "Inventory UI — Playwright smoke"
      test_command: "npm run test:inventory:ui:smoke"
      artifact_name: "inventory-ui-smoke-playwright"

  # ---------------------------------------------------------------------------
  # 库存盘点前端真实交互: 本地容器 + Playwright smoke
  # ---------------------------------------------------------------------------
  stocktaking-ui-smoke:
    uses: ./.github/workflows/real-browser-ui-playwright.yml
    with:
      job_name: "Stocktaking UI — Playwright smoke"
      test_command: "npm run test:stocktaking:ui:smoke"
      artifact_name: "stocktaking-ui-smoke-playwright"

  # ---------------------------------------------------------------------------
  # 库存仓位治理前端真实交互: 本地容器 + Playwright governance regression
  # ---------------------------------------------------------------------------
  inventory-warehouse-ui-governance:
    uses: ./.github/workflows/real-browser-ui-playwright.yml
    with:
      job_name: "Inventory Warehouse UI — Governance regression"
      test_command: "npm run test:inventory-warehouse:ui:governance"
      artifact_name: "inventory-warehouse-ui-governance-playwright"

  # ---------------------------------------------------------------------------
  # 库存总览前端真实交互: 本地容器 + Playwright regression
  # ---------------------------------------------------------------------------
  inventory-ui-regression:
    if: github.event_name == 'push' && github.ref_name == 'develop'
    uses: ./.github/workflows/real-browser-ui-playwright.yml
    with:
      job_name: "Inventory UI — Playwright regression"
      test_command: "npm run test:inventory:ui:regression"
      artifact_name: "inventory-ui-regression-playwright"

  # ---------------------------------------------------------------------------
  # 库存盘点前端真实交互: 本地容器 + Playwright regression
  # ---------------------------------------------------------------------------
  stocktaking-ui-regression:
    if: github.event_name == 'push' && github.ref_name == 'develop'
    uses: ./.github/workflows/real-browser-ui-playwright.yml
    with:
      job_name: "Stocktaking UI — Playwright regression"
      test_command: "npm run test:stocktaking:ui:regression"
      artifact_name: "stocktaking-ui-regression-playwright"

  # ---------------------------------------------------------------------------
  # 销售结算前端真实交互: 本地容器 + Playwright smoke
  # ---------------------------------------------------------------------------
  settlement-ui-smoke:
    uses: ./.github/workflows/real-browser-ui-playwright.yml
    with:
      job_name: "Settlement UI — Playwright smoke"
      test_command: "npm run test:settlement:ui:smoke"
      artifact_name: "settlement-ui-smoke-playwright"

  # ---------------------------------------------------------------------------
  # 销售结算前端真实交互: 本地容器 + Playwright regression
  # ---------------------------------------------------------------------------
  settlement-ui-regression:
    if: github.event_name == 'push' && github.ref_name == 'develop'
    uses: ./.github/workflows/real-browser-ui-playwright.yml
    with:
      job_name: "Settlement UI — Playwright regression"
      test_command: "npm run test:settlement:ui:regression"
      artifact_name: "settlement-ui-regression-playwright"

  # ---------------------------------------------------------------------------
  # 销售订单前端真实交互: 本地容器 + Playwright regression
  # ---------------------------------------------------------------------------
  sales-order-ui-regression:
    if: github.event_name == 'push' && github.ref_name == 'develop'
    uses: ./.github/workflows/real-browser-ui-playwright.yml
    with:
      job_name: "Sales Order UI — Playwright regression"
      test_command: "npm run test:sales-order:ui:regression"
      artifact_name: "sales-order-ui-regression-playwright"

  # ---------------------------------------------------------------------------
  # 采购前端真实交互: 本地容器 + Playwright regression
  # ---------------------------------------------------------------------------
  purchase-ui-regression:
    if: github.event_name == 'push' && github.ref_name == 'develop'
    uses: ./.github/workflows/real-browser-ui-playwright.yml
    with:
      job_name: "Purchase UI — Playwright regression"
      test_command: "npm run test:purchase:ui:regression"
      artifact_name: "purchase-ui-regression-playwright"

  # ---------------------------------------------------------------------------
  # 来料质检前端真实交互: 本地容器 + Playwright regression
  # ---------------------------------------------------------------------------
  incoming-inspection-ui-regression:
    if: github.event_name == 'push' && github.ref_name == 'develop'
    uses: ./.github/workflows/real-browser-ui-playwright.yml
    with:
      job_name: "Incoming Inspection UI — Playwright regression"
      test_command: "npm run test:incoming-inspection:ui:regression"
      artifact_name: "incoming-inspection-ui-regression-playwright"

  # ---------------------------------------------------------------------------
  # 采购建议管理前端真实交互: 本地容器 + Playwright regression
  # ---------------------------------------------------------------------------
  purchase-suggestion-ui-regression:
    if: github.event_name == 'push' && github.ref_name == 'develop'
    uses: ./.github/workflows/real-browser-ui-playwright.yml
    with:
      job_name: "Purchase Suggestion UI — Playwright regression"
      test_command: "npm run test:purchase-suggestion:ui:regression"
      artifact_name: "purchase-suggestion-ui-regression-playwright"

  # ---------------------------------------------------------------------------
  # 汇总门禁: 所有 job 通过才允许合并
  # ---------------------------------------------------------------------------
  ci-gate:
    name: CI Gate
    needs: [api-unit, api-outsource-flow-unit, api-access-control-unit, api-integration, api-access-control-integration, api-e2e, web, web-ui-mock, purchase-ui-smoke, incoming-inspection-ui-smoke, purchase-suggestion-ui-smoke, permission-control-ui-smoke, sales-order-ui-smoke, process-config-ui-smoke, production-schedule-ui-smoke, production-order-ui-smoke, production-task-ui-smoke, production-shortage-ui-smoke, inventory-ui-smoke, stocktaking-ui-smoke, inventory-warehouse-ui-governance, settlement-ui-smoke, purchase-ui-regression, incoming-inspection-ui-regression, purchase-suggestion-ui-regression, permission-control-ui-regression, sales-order-ui-regression, process-config-ui-regression, production-schedule-ui-regression, production-order-ui-regression, production-task-ui-regression, production-shortage-ui-regression, inventory-ui-regression, stocktaking-ui-regression, settlement-ui-regression]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          failed=0
          required_results=(
            "${{ needs.api-unit.result }}"
            "${{ needs.api-outsource-flow-unit.result }}"
            "${{ needs.api-access-control-unit.result }}"
            "${{ needs.api-integration.result }}"
            "${{ needs.api-access-control-integration.result }}"
            "${{ needs.api-e2e.result }}"
            "${{ needs.web.result }}"
            "${{ needs.web-ui-mock.result }}"
            "${{ needs.purchase-ui-smoke.result }}"
            "${{ needs.incoming-inspection-ui-smoke.result }}"
            "${{ needs.purchase-suggestion-ui-smoke.result }}"
            "${{ needs.permission-control-ui-smoke.result }}"
            "${{ needs.sales-order-ui-smoke.result }}"
            "${{ needs.process-config-ui-smoke.result }}"
            "${{ needs.production-schedule-ui-smoke.result }}"
            "${{ needs.production-order-ui-smoke.result }}"
            "${{ needs.production-task-ui-smoke.result }}"
            "${{ needs.production-shortage-ui-smoke.result }}"
            "${{ needs.inventory-ui-smoke.result }}"
            "${{ needs.stocktaking-ui-smoke.result }}"
            "${{ needs.inventory-warehouse-ui-governance.result }}"
            "${{ needs.settlement-ui-smoke.result }}"
          )
          for r in "${required_results[@]}"; do
            if [ "$r" != "success" ]; then
              echo "Required job failed or skipped: $r"
              failed=1
            fi
          done
          purchase_regression_result="${{ needs.purchase-ui-regression.result }}"
          incoming_inspection_regression_result="${{ needs.incoming-inspection-ui-regression.result }}"
          purchase_suggestion_regression_result="${{ needs.purchase-suggestion-ui-regression.result }}"
          permission_control_regression_result="${{ needs.permission-control-ui-regression.result }}"
          sales_order_regression_result="${{ needs.sales-order-ui-regression.result }}"
          process_config_regression_result="${{ needs.process-config-ui-regression.result }}"
          production_schedule_regression_result="${{ needs.production-schedule-ui-regression.result }}"
          production_order_regression_result="${{ needs.production-order-ui-regression.result }}"
          production_task_regression_result="${{ needs.production-task-ui-regression.result }}"
          production_shortage_regression_result="${{ needs.production-shortage-ui-regression.result }}"
          inventory_regression_result="${{ needs.inventory-ui-regression.result }}"
          stocktaking_regression_result="${{ needs.stocktaking-ui-regression.result }}"
          settlement_regression_result="${{ needs.settlement-ui-regression.result }}"
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_name }}" = "develop" ]; then

name: Real Browser UI Playwright

on:
  workflow_call:
    inputs:
      job_name:
        required: true
        type: string
      pre_test_command:
        required: false
        default: ""
        type: string
      test_command:
        required: true
        type: string
      artifact_name:
        required: true
        type: string

jobs:
  real-browser-ui:
    name: ${{ inputs.job_name }}
    runs-on: ubuntu-latest

    env:
      PLAYWRIGHT_SKIP_WEBSERVER: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - uses: ./.github/actions/setup-real-browser-ui-ci

      - name: Run pre-test command
        if: ${{ inputs.pre_test_command != '' }}
        run: ${{ inputs.pre_test_command }}

      - name: Run real-browser UI Playwright
        run: ${{ inputs.test_command }}

      - name: Upload Playwright artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ inputs.artifact_name }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7

      - name: Stop local stack
        if: always()
        run: docker compose down -v

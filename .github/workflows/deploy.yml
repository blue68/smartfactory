# =============================================================================
# CD — 部署流水线
# 触发: main 分支推送（合并 PR 后自动部署）
# 步骤: build docker images → push to registry → deploy
# =============================================================================

name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - "services/**"
      - "docker-compose*.yml"
      - "infra/**"

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  API_IMAGE: ${{ github.repository }}/smart-factory-api
  WEB_IMAGE: ${{ github.repository }}/smart-factory-web

jobs:
  # ---------------------------------------------------------------------------
  # Build & Push Docker Images
  # ---------------------------------------------------------------------------
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | head -c 7)
          echo "version=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "tag_date=$(date +'%Y%m%d')" >> "$GITHUB_OUTPUT"

      # ── API Image ──
      - name: Build & Push API
        uses: docker/build-push-action@v5
        with:
          context: ./services/api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      # ── Web Image ──
      - name: Build & Push Web
        uses: docker/build-push-action@v5
        with:
          context: ./services/web
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.WEB_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.WEB_IMAGE }}:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  # ---------------------------------------------------------------------------
  # Deploy to Production Server
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH || '/opt/smart-factory' }}

            # Pull latest config
            git pull origin main

            # Set image tag
            export IMAGE_TAG=${{ needs.build.outputs.image_tag }}
            export REGISTRY=${{ env.REGISTRY }}
            export IMAGE_REPO=${{ github.repository }}

            # Run DB migrations
            bash infra/db/migrate.sh

            # Deploy with zero-downtime rolling update
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull api web
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps api web

            # Health check (wait up to 60s)
            for i in $(seq 1 12); do
              if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
                echo "API healthy after ${i}x5s"
                break
              fi
              sleep 5
            done

            # Cleanup old images
            docker image prune -f --filter "until=168h"

            echo "Deploy complete: IMAGE_TAG=${IMAGE_TAG}"

      - name: Verify Deployment
        run: |
          echo "Deployed image tag: ${{ needs.build.outputs.image_tag }}"
          echo "Deploy triggered by: ${{ github.event.head_commit.message }}"
